spring:
  datasource:
    url: jdbc:mysql://192.168.1.200:3306/mysql?useUnicode=true&characterEncoding=UTF-8&serverTimezone=UTC&autoReconnect=true&failOverReadOnly=false&maxReconnects=10
    username: root
    password: xd@Mysql123!
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      # ================== 关键：无限等待数据库 ==================
      initialization-fail-timeout: -1    # 不限制时间，一直重试直到成功
      connection-timeout: 30000          # 单次获取连接最大等待时间（30秒）

      # ================== 连接池基础配置 ==================
      maximum-pool-size: 10              # 最大连接数
      minimum-idle: 5                    # 最小空闲连接
      idle-timeout: 600000               # 空闲连接最大存活时间（10分钟）
      max-lifetime: 1800000              # 连接最大生命周期（30分钟）

      # ================== 连接检测 ==================
      validation-timeout: 5000           # 校验超时
      connection-test-query: SELECT 1    # 连接检测SQL

server:
  port: 8080
  servlet:
    context-path: /myapp